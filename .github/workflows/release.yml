name: Create release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    steps:
      - name: Get latest code
        uses: actions/checkout@v4

      - name: Bundle files
        run: |
          mkdir -p ./temp/ox_inv_addons
          cp ./{LICENSE,README.md,fxmanifest.lua,version.lua} ./temp/ox_inv_addons
          cp -r ./{backItems,dragCraft,itemCarry} ./temp/ox_inv_addons
          cd ./temp && zip -r ../ox_inv_addons.zip ./ox_inv_addons

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          name: "OX_INV_ADDONS ${{ github.ref_name }}"
          body: |
            ![Pulsar Framework](https://r2.fivemanage.com/GPYOH8Hq4GPyAY7czrgLe/pulsarbanner.png)

            ## OX_INV_ADDONS ${{ github.ref_name }}

            Inventory addon features for Pulsar Framework.

            ### Installation
            1. Download `ox_inv_addons.zip` below
            2. Extract into your server's `resources` folder
            3. Add `ensure ox_inv_addons` to your `server.cfg`

            ---
            ![Pulsar Framework](https://img.shields.io/badge/Pulsar-Framework-7c3aed?style=flat-square)
            ![Built for FiveM](https://img.shields.io/badge/Built_for-FiveM-F40552?style=flat-square)
          files: ox_inv_addons.zip
          prerelease: false
